<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexaBot - AI Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1040 0%, #2d1b69 50%, #1a1040 100%);
      min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
    }
    .phone-frame {
      width: 380px;
      background: rgba(255,255,255,0.08);
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 14px;
      backdrop-filter: blur(10px);
    }
    .screen {
      background: #ffffff;
      border-radius: 28px;
      overflow: hidden;
      display: flex; flex-direction: column;
      height: 680px;
    }
    .chat-header {
      padding: 16px 18px 14px;
      background: linear-gradient(135deg, #534AB7, #7F77DD);
      display: flex; align-items: center; gap: 12px;
    }
    .avatar-ring {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .avatar-ring i { font-size: 22px; color: #fff; }
    .header-info .bot-name { font-size: 16px; font-weight: 700; color: #fff; }
    .header-info .bot-status {
      font-size: 12px; color: rgba(255,255,255,0.8);
      display: flex; align-items: center; gap: 5px; margin-top: 2px;
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .header-actions { margin-left: auto; display: flex; gap: 10px; }
    .header-actions i { font-size: 20px; color: rgba(255,255,255,0.8); cursor: pointer; }
    .header-actions i:hover { color: #fff; }
    .tag-bar {
      background: #f8f7ff; padding: 8px 14px;
      display: flex; gap: 6px; border-bottom: 1px solid #ebe8ff;
    }
    .tag {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: #EEEDFE; color: #534AB7; border: 1px solid #c5c2e8;
      display: flex; align-items: center; gap: 4px;
    }
    .tag i { font-size: 11px; }
    .messages {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 14px; background: #fafafa;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #c5c2e8; border-radius: 4px; }
    .date-divider {
      text-align: center; font-size: 11px; color: #aaa;
      display: flex; align-items: center; gap: 8px;
    }
    .date-divider::before, .date-divider::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }
    .msg { display: flex; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }
    .msg-icon {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: auto;
    }
    .msg.bot .msg-icon { background: #EEEDFE; }
    .msg.user .msg-icon { background: #E1F5EE; }
    .msg.bot .msg-icon i { font-size: 15px; color: #534AB7; }
    .msg.user .msg-icon i { font-size: 15px; color: #0F6E56; }
    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 76%; }
    .msg.user .bubble-wrap { align-items: flex-end; }
    .bubble {
      padding: 10px 14px; font-size: 13.5px; line-height: 1.55;
      border-radius: 18px; word-break: break-word;
    }
    .msg.bot .bubble {
      background: #fff; color: #222;
      border-radius: 4px 18px 18px 18px;
      border: 1px solid #ebe8ff;
      box-shadow: 0 1px 4px rgba(83,74,183,0.06);
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, #534AB7, #7F77DD);
      color: #fff; border-radius: 18px 4px 18px 18px;
    }
    .timestamp { font-size: 10px; color: #bbb; padding: 0 4px; }
    .nlp-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .nlp-tag {
      font-size: 10px; padding: 2px 8px; border-radius: 20px;
      background: #EEEDFE; color: #534AB7; border: 1px solid #c5c2e8;
    }
    .typing-bubble { padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #AFA9EC; animation: bounce 1.3s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    .chip-row {
      display: flex; gap: 7px; flex-wrap: wrap; padding: 8px 14px 6px;
      background: #fafafa; border-top: 1px solid #eee;
    }
    .chip {
      padding: 5px 13px; border-radius: 20px; border: 1px solid #c5c2e8;
      font-size: 12px; color: #534AB7; background: #EEEDFE;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .chip:hover { background: #534AB7; color: #fff; border-color: #534AB7; }
    .input-bar {
      padding: 10px 14px; border-top: 1px solid #eee;
      display: flex; gap: 8px; align-items: center; background: #fff;
    }
    .attach-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid #ddd; background: #f5f5f5;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
    }
    .attach-btn:hover { background: #EEEDFE; border-color: #c5c2e8; }
    .attach-btn i { font-size: 17px; color: #888; }
    .msg-input {
      flex: 1; padding: 10px 16px; border: 1px solid #ddd;
      border-radius: 24px; font-size: 13.5px; background: #f8f8fb;
      color: #222; outline: none; transition: border 0.2s, background 0.2s;
    }
    .msg-input:focus { border-color: #7F77DD; background: #fff; }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #534AB7, #7F77DD);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn i { font-size: 16px; color: #fff; }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">
    <div class="chat-header">
      <div class="avatar-ring"><i class="ti ti-robot"></i></div>
      <div class="header-info">
        <div class="bot-name">NexaBot AI</div>
        <div class="bot-status"><span class="pulse-dot"></span> Always online</div>
      </div>
      <div class="header-actions">
        <i class="ti ti-search" title="Search"></i>
        <i class="ti ti-dots-vertical" title="More options"></i>
      </div>
    </div>

    <div class="tag-bar">
      <span class="tag"><i class="ti ti-brain"></i> NLP</span>
      <span class="tag"><i class="ti ti-bolt"></i> Fast</span>
      <span class="tag"><i class="ti ti-shield-check"></i> Secure</span>
    </div>

    <div class="messages" id="messages">
      <div class="date-divider">Today</div>
      <div class="msg bot">
        <div class="msg-icon"><i class="ti ti-robot"></i></div>
        <div class="bubble-wrap">
          <div class="bubble">Hey! I'm <strong>NexaBot</strong> — your AI assistant built with Python NLP. Ask me anything!</div>
          <div class="nlp-tags">
            <span class="nlp-tag">Intent: greeting</span>
            <span class="nlp-tag">Confidence: 98%</span>
          </div>
          <div class="timestamp">Just now</div>
        </div>
      </div>
    </div>

    <div class="chip-row" id="chips">
      <span class="chip" onclick="sendChip(this)">What is AI?</span>
      <span class="chip" onclick="sendChip(this)">Hello!</span>
      <span class="chip" onclick="sendChip(this)">Exam tips</span>
      <span class="chip" onclick="sendChip(this)">Placement tips</span>
    </div>

    <div class="input-bar">
      <div class="attach-btn"><i class="ti ti-paperclip"></i></div>
      <input class="msg-input" type="text" id="userInput" placeholder="Ask NexaBot anything..." />
      <button class="send-btn" onclick="sendMessage()"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

<script>
  function getTime() {
    const d = new Date();
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
  }

  function addMessage(text, sender, meta) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    const icon = document.createElement('div');
    icon.className = 'msg-icon';
    icon.innerHTML = sender === 'bot' ? '<i class="ti ti-robot"></i>' : '<i class="ti ti-user"></i>';
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    if (sender === 'bot' && meta) {
      const tags = document.createElement('div');
      tags.className = 'nlp-tags';
      tags.innerHTML = '<span class="nlp-tag">Intent: ' + meta.intent + '</span><span class="nlp-tag">Confidence: ' + meta.conf + '</span>';
      wrap.appendChild(tags);
    }
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = getTime();
    wrap.appendChild(ts);
    div.appendChild(icon);
    div.appendChild(wrap);
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function showTyping() {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = '<div class="msg-icon"><i class="ti ti-robot"></i></div><div class="bubble-wrap"><div class="bubble"><div class="typing-bubble"><span></span><span></span><span></span></div></div></div>';
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    document.getElementById('chips').style.display = 'none';
    addMessage(text, 'user', null);
    input.value = '';
    showTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      removeTyping();
      addMessage(data.response, 'bot', { intent: data.intent, conf: data.confidence });
    } catch (e) {
      removeTyping();
      addMessage('Connection error! Is Flask running?', 'bot', { intent: 'error', conf: '0%' });
    }
  }

  function sendChip(el) {
    document.getElementById('userInput').value = el.textContent;
    sendMessage();
  }

  document.getElementById('userInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
